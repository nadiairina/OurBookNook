
<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Book Nook | Contacto</title>
    <meta name="description" content="Envie a sua correspondência ao Our Book Nook. Adoramos ouvir os nossos leitores.">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- ═══════════════════════════════ NAVIGATION ══════════════════════════════ -->
    <nav id="mainNav">
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Our Book Nook" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="review.html">Reviews</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <!-- ═══════════════════════════════ PAGE HERO ════════════════════════════════ -->
    <div class="page-hero">
        <div class="container">
            <p
                style="font-family:var(--font-ui);font-size:0.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:0.8rem;">
            </p>
            <div class="rule"></div>
            <h1><i>Contacta-nos</i></h1>
            <p>Adoramos receber feedback e recomendações de livros</p>
            <div class="rule"></div>
        </div>
    </div>

    <main>
        <section class="section-pad">
            <div class="container">
                <div class="contact-wrapper reveal">
                    <form id="contactForm" style="display:flex;flex-direction:column;gap:1.8rem;">

                        <div class="form-group">
                            <label class="form-label" for="nome">Nome</label>
                            <input class="form-control" type="text" id="nome" name="nome"
                                 required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" type="email" id="email" name="email"
                                 required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="assunto">Assunto</label>
                            <input class="form-control" type="text" id="assunto" name="assunto"
                                 required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="mensagem"> Mensagem</label>
                            <textarea class="form-control" id="mensagem" name="mensagem" rows="6"
                               required></textarea>
                        </div>

                        <div>
                            <button type="submit" class="btn btn-gold"><i>Enviar</i></button>
                        </div>
<div class="rule"></div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- ═══════════════════════════════ FOOTER ══════════════════════════════════ -->
    <footer>
        <div class="container">
            <img src="logo.png" alt="Our Book Nook" class="footer-logo">
            
            <div class="footer-divider"></div>
            <ul class="footer-nav">
                <li><a href="index.html">Início</a></li>
                <li><a href="review.html">Reviews</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                
            </ul>
            <div class="text-xs">
                <p>&copy; 2026 Our Book Nook. Todos os direitos reservados.</p>
                <p class="mt-1">Website desenvolvido por 
                    <a href="https://nadiairina.github.io/Nadia-Portfolio/" target="_blank" class="developer-link">Nadia Irina.</a>
                </p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>

</html>
